openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Salli Islamic Prayer App API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: prayers
    description: Prayer tracking operations
  - name: users
    description: User profile operations
  - name: openai
    description: OpenAI AI chat, image, and audio operations
  - name: social
    description: Friends, user search, and direct messaging
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Validation error or email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/profile:
    patch:
      operationId: updateProfile
      tags: [users]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /prayers/{date}:
    get:
      operationId: getPrayerDay
      tags: [prayers]
      summary: Get prayer completion for a specific date
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
            description: "Date in YYYY-MM-DD format"
      responses:
        "200":
          description: Prayer day data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrayerDay"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /prayers/{date}/{prayer}:
    post:
      operationId: markPrayer
      tags: [prayers]
      summary: Mark a prayer as completed
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
        - name: prayer
          in: path
          required: true
          schema:
            type: string
            enum: [fajr, dhuhr, asr, maghrib, isha]
      responses:
        "200":
          description: Prayer marked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrayerDay"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: unmarkPrayer
      tags: [prayers]
      summary: Unmark a prayer (set as not completed)
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
        - name: prayer
          in: path
          required: true
          schema:
            type: string
            enum: [fajr, dhuhr, asr, maghrib, isha]
      responses:
        "200":
          description: Prayer unmarked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrayerDay"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /prayers/week:
    get:
      operationId: getWeeklyPrayers
      tags: [prayers]
      summary: Get prayer data for the current week (Mon-Sun)
      responses:
        "200":
          description: Weekly prayer data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPrayers"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [users]
      summary: Get all users ranked by weekly prayer completion
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /prayers/stats:
    get:
      operationId: getPrayerStats
      tags: [prayers]
      summary: Get streak, total, and weekly statistics
      responses:
        "200":
          description: Prayer statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrayerStats"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /social/users/search:
    get:
      operationId: searchUsers
      tags: [social]
      summary: Search users by username
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matching users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SocialUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /social/friends:
    get:
      operationId: listFriends
      tags: [social]
      summary: List accepted friends
      responses:
        "200":
          description: Friends list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SocialUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /social/friends/requests:
    get:
      operationId: listFriendRequests
      tags: [social]
      summary: List incoming pending friend requests
      responses:
        "200":
          description: Incoming requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FriendRequest"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /social/friends/request/{userId}:
    post:
      operationId: sendFriendRequest
      tags: [social]
      summary: Send a friend request
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Request sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Already friends or request exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /social/friends/accept/{userId}:
    post:
      operationId: acceptFriendRequest
      tags: [social]
      summary: Accept a friend request
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /social/friends/decline/{userId}:
    post:
      operationId: declineFriendRequest
      tags: [social]
      summary: Decline a friend request
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Declined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /social/friends/{userId}:
    delete:
      operationId: removeFriend
      tags: [social]
      summary: Remove a friend or cancel a sent request
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /social/messages:
    get:
      operationId: listMessageThreads
      tags: [social]
      summary: List direct message threads (one per conversation partner)
      responses:
        "200":
          description: Message threads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MessageThread"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /social/messages/{userId}:
    get:
      operationId: getMessageThread
      tags: [social]
      summary: Get all messages with a specific user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DirectMessage"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: sendDirectMessage
      tags: [social]
      summary: Send a direct message to a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendDirectMessageBody"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectMessage"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /social/messages/{userId}/read:
    put:
      operationId: markMessagesRead
      tags: [social]
      summary: Mark all messages from a user as read
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /social/notifications/count:
    get:
      operationId: getNotificationsCount
      tags: [social]
      summary: Get count of pending requests and unread messages
      responses:
        "200":
          description: Counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsCount"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    RegisterBody:
      type: object
      properties:
        displayName:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required:
        - displayName
        - email
        - password

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    UpdateProfileBody:
      type: object
      properties:
        displayName:
          type: string
          minLength: 2
        username:
          type: string
          minLength: 3
          maxLength: 30
        city:
          type: ["string", "null"]
      required:
        - displayName

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        displayName:
          type: string
        username:
          type: ["string", "null"]
        email:
          type: string
        city:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - displayName
        - email
        - createdAt

    PrayerDay:
      type: object
      properties:
        date:
          type: string
        fajr:
          type: boolean
        dhuhr:
          type: boolean
        asr:
          type: boolean
        maghrib:
          type: boolean
        isha:
          type: boolean
        completedCount:
          type: integer
      required:
        - date
        - fajr
        - dhuhr
        - asr
        - maghrib
        - isha
        - completedCount

    WeeklyPrayerDay:
      type: object
      properties:
        date:
          type: string
        dayName:
          type: string
        fajr:
          type: boolean
        dhuhr:
          type: boolean
        asr:
          type: boolean
        maghrib:
          type: boolean
        isha:
          type: boolean
        completedCount:
          type: integer
        isToday:
          type: boolean
      required:
        - date
        - dayName
        - fajr
        - dhuhr
        - asr
        - maghrib
        - isha
        - completedCount
        - isToday

    WeeklyPrayers:
      type: object
      properties:
        days:
          type: array
          items:
            $ref: "#/components/schemas/WeeklyPrayerDay"
        weeklyTotal:
          type: integer
        weeklyPercentage:
          type: number
      required:
        - days
        - weeklyTotal
        - weeklyPercentage

    PrayerStats:
      type: object
      properties:
        currentStreak:
          type: integer
        totalPrayers:
          type: integer
        weeklyTotal:
          type: integer
        weeklyPercentage:
          type: number
      required:
        - currentStreak
        - totalPrayers
        - weeklyTotal
        - weeklyPercentage

    SocialUser:
      type: object
      properties:
        id:
          type: integer
        displayName:
          type: string
        username:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        friendshipStatus:
          type: string
          enum: [none, pending_sent, pending_received, friends]
      required:
        - id
        - displayName
        - friendshipStatus

    FriendRequest:
      type: object
      properties:
        id:
          type: integer
        user:
          $ref: "#/components/schemas/SocialUser"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - user
        - createdAt

    DirectMessage:
      type: object
      properties:
        id:
          type: integer
        senderId:
          type: integer
        receiverId:
          type: integer
        content:
          type: string
        readAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - senderId
        - receiverId
        - content
        - createdAt

    MessageThread:
      type: object
      properties:
        partner:
          $ref: "#/components/schemas/SocialUser"
        lastMessage:
          $ref: "#/components/schemas/DirectMessage"
        unreadCount:
          type: integer
      required:
        - partner
        - lastMessage
        - unreadCount

    SendDirectMessageBody:
      type: object
      properties:
        content:
          type: string
          minLength: 1
      required:
        - content

    NotificationsCount:
      type: object
      properties:
        pendingRequests:
          type: integer
        unreadMessages:
          type: integer
      required:
        - pendingRequests
        - unreadMessages

    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    CreateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    LeaderboardEntry:
      type: object
      properties:
        userId:
          type: integer
        displayName:
          type: string
        city:
          type: ["string", "null"]
        weeklyTotal:
          type: integer
        weeklyPercentage:
          type: number
        currentStreak:
          type: integer
        isCurrentUser:
          type: boolean
        rank:
          type: integer
      required:
        - userId
        - displayName
        - weeklyTotal
        - weeklyPercentage
        - currentStreak
        - isCurrentUser
        - rank
