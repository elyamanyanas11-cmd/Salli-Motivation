kind = "web"
previewPath = "/"
title = "Salli - Islamic Prayer App"
version = "1.0.0"
id = "artifacts/salli"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21353

[services.development]
run = "pnpm --filter @workspace/salli run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/salli", "run", "build" ]
publicDir = "artifacts/salli/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21353"
BASE_PATH = "/"
